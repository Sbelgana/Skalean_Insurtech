# Skalean InsurTech v2.2 -- Redis 7.4 configuration
# Reference: 00-pilotage/meta-prompts/B-01-sprint-01-bootstrap.md (Tache 1.1.3)
#            decision-006 (no-emoji)

# ============================================================================
# Network
# ============================================================================
bind 0.0.0.0
protected-mode yes
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# ============================================================================
# General
# ============================================================================
daemonize no
supervised no
loglevel notice
databases 16
always-show-logo no

# ============================================================================
# Snapshotting (RDB)
# ============================================================================
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# ============================================================================
# Append Only File (AOF) -- persistance plus durable
# ============================================================================
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# ============================================================================
# Memory management
# ============================================================================
maxmemory 512mb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# ============================================================================
# Notifications keyspace events (eviction monitoring)
# ============================================================================
notify-keyspace-events "Ex"

# ============================================================================
# Slow log
# ============================================================================
slowlog-log-slower-than 10000
slowlog-max-len 128

# ============================================================================
# Latency monitor
# ============================================================================
latency-monitor-threshold 100

# ============================================================================
# Lazy freeing
# ============================================================================
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
replica-lazy-flush yes
lazyfree-lazy-user-del yes

# ============================================================================
# Client buffers
# ============================================================================
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# ============================================================================
# Threading
# ============================================================================
io-threads 2
io-threads-do-reads yes
