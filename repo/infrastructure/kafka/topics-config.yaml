  dlq:
    description: "Dead Letter Queue topics par domaine fonctionnel"
    retention_days: 30
    partitions: 1
    topics:
      - name: insurtech.dlq.comm.failed
        domain: comm
        sla_replay_minutes: 30
      - name: insurtech.dlq.pay.failed
